<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pyramid Backstage</title>
<style>
  :root{
    --stone:#1c1b19;
    --concrete:#ede8df;
    --paper:#f7f4ed;
    --signal:#ff5a36;
    --blue-space:#3b6ea5;
    --orange-space:#c8682f;
    --green-space:#4a7c59;
    --yellow-space:#c9a227;
    --ink:#1c1b19;
    --line:#d8d2c4;
    --ok:#4a7c59;
    --warn:#c8682f;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:'Söhne',-apple-system,'Inter',sans-serif;background:var(--concrete);color:var(--ink);}
  h1,h2,h3,.display{font-family:Georgia,'Times New Roman',serif;letter-spacing:-0.01em;}
  button{font-family:inherit;cursor:pointer;}
  /* ---- Login Screen ---- */
  #login{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--stone);color:var(--paper);padding:24px;}
  #login .mark{font-size:13px;letter-spacing:.18em;text-transform:uppercase;color:#9a948a;margin-bottom:8px;}
  #login h1{font-size:clamp(32px,6vw,56px);margin:0 0 6px;color:#fff;}
  #login p.sub{color:#b3aea3;margin:0 0 40px;max-width:480px;text-align:center;}
  .role-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;width:100%;max-width:920px;}
  .role-card{background:#262420;border:1px solid #3a372f;border-radius:4px;padding:22px 16px;text-align:left;color:var(--paper);transition:.15s;}
  .role-card:hover{border-color:var(--signal);background:#2c2924;}
  .role-card .num{font-size:11px;color:var(--signal);letter-spacing:.1em;margin-bottom:10px;display:block;}
  .role-card .name{font-size:18px;font-family:Georgia,serif;margin-bottom:6px;}
  .role-card .desc{font-size:12.5px;color:#9a948a;line-height:1.4;}
  @media(max-width:800px){.role-grid{grid-template-columns:1fr 1fr;}}
  /* ---- App Shell ---- */
  #app{display:none;min-height:100vh;}
  .topbar{background:var(--stone);color:var(--paper);display:flex;align-items:center;justify-content:space-between;padding:14px 28px;}
  .topbar .brand{font-family:Georgia,serif;font-size:17px;display:flex;align-items:center;gap:10px;}
  .brand .tri{width:0;height:0;border-left:7px solid transparent;border-right:7px solid transparent;border-bottom:12px solid var(--signal);}
  .topbar .who{font-size:12.5px;color:#b3aea3;}
  .topbar .who b{color:#fff;}
  .topbar button.logout{background:none;border:1px solid #4a463c;color:#b3aea3;font-size:12px;padding:6px 12px;border-radius:3px;}
  .topbar button.logout:hover{color:#fff;border-color:#fff;}
  .tabs{display:flex;gap:2px;background:#fff;border-bottom:1px solid var(--line);padding:0 28px;overflow-x:auto;}
  .tab{padding:13px 16px;font-size:13.5px;color:#7a756a;border-bottom:2px solid transparent;white-space:nowrap;}
  .tab.active{color:var(--ink);border-bottom-color:var(--signal);font-weight:600;}
  .tab:hover{color:var(--ink);}
  main{padding:28px;max-width:1180px;margin:0 auto;}
  .page{display:none;}
  .page.active{display:block;animation:fade .2s ease;}
  @keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
  h2.page-title{font-size:24px;margin:0 0 4px;}
  p.page-sub{color:#7a756a;font-size:13.5px;margin:0 0 24px;}
  .grid2{display:grid;grid-template-columns:1.1fr .9fr;gap:20px;}
  @media(max-width:900px){.grid2{grid-template-columns:1fr;}}
  .card{background:#fff;border:1px solid var(--line);border-radius:4px;padding:22px;}
  .card+.card{margin-top:16px;}
  label{display:block;font-size:12px;text-transform:uppercase;letter-spacing:.06em;color:#7a756a;margin-bottom:5px;margin-top:14px;}
  label:first-child{margin-top:0;}
  input,select,textarea{width:100%;padding:10px 11px;border:1px solid var(--line);border-radius:3px;font-size:14px;background:var(--paper);font-family:inherit;}
  textarea{resize:vertical;min-height:60px;}
  input:focus,select:focus,textarea:focus{outline:2px solid var(--signal);outline-offset:-1px;border-color:var(--signal);}
  .btn{display:inline-block;background:var(--signal);color:#fff;border:none;padding:11px 20px;border-radius:3px;font-size:13.5px;font-weight:600;letter-spacing:.01em;}
  .btn:hover{background:#e6491f;}
  .btn.ghost{background:none;border:1px solid var(--line);color:var(--ink);}
  .btn.ghost:hover{border-color:var(--ink);}
  .btn.small{padding:7px 12px;font-size:12.5px;}
  .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
  .badge{display:inline-block;font-size:11px;padding:3px 9px;border-radius:20px;font-weight:600;letter-spacing:.02em;}
  .badge.pending{background:#f3ead3;color:#8a6d1c;}
  .badge.review{background:#dbe7f0;color:var(--blue-space);}
  .badge.approved{background:#dfeadd;color:var(--ok);}
  .badge.confirmed{background:#1c1b19;color:#fff;}
  .badge.conflict{background:#f6d9cc;color:var(--warn);}
  table{width:100%;border-collapse:collapse;font-size:13.5px;}
  th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:#7a756a;padding:8px 10px;border-bottom:1px solid var(--line);}
  td{padding:11px 10px;border-bottom:1px solid #ece8de;}
  tr:last-child td{border-bottom:none;}
  tr.clickable:hover{background:var(--paper);cursor:pointer;}
  .space-pill{display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:600;}
  .dot{width:9px;height:9px;border-radius:50%;display:inline-block;}
  .dot.blue{background:var(--blue-space);} .dot.orange{background:var(--orange-space);} .dot.green{background:var(--green-space);} .dot.yellow{background:var(--yellow-space);}
  .empty{padding:40px 20px;text-align:center;color:#9a948a;font-size:13.5px;}
  .stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:22px;}
  .stat{background:#fff;border:1px solid var(--line);border-radius:4px;padding:16px 18px;}
  .stat .n{font-family:Georgia,serif;font-size:28px;line-height:1;}
  .stat .l{font-size:11.5px;color:#7a756a;text-transform:uppercase;letter-spacing:.04em;margin-top:6px;}
  .inv-bar{height:6px;background:var(--line);border-radius:3px;overflow:hidden;margin-top:8px;}
  .inv-bar > div{height:100%;background:var(--green-space);}
  .checklist label{display:flex;align-items:center;gap:10px;font-size:13.5px;text-transform:none;color:var(--ink);margin:0;padding:9px 0;border-bottom:1px solid #ece8de;cursor:pointer;}
  .checklist input[type=checkbox]{width:auto;accent-color:var(--signal);}
  .checklist span.done{text-decoration:line-through;color:#9a948a;}
  .modal-bg{position:fixed;inset:0;background:rgba(28,27,25,.55);display:none;align-items:center;justify-content:center;padding:20px;z-index:50;}
  .modal-bg.active{display:flex;}
  .modal{background:#fff;border-radius:5px;max-width:560px;width:100%;max-height:85vh;overflow-y:auto;padding:28px;}
  .modal h3{margin:0 0 4px;}
  .close-x{position:absolute;top:18px;right:20px;border:none;background:none;font-size:20px;color:#7a756a;}
  .quote-line{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #ece8de;font-size:13.5px;}
  .quote-total{display:flex;justify-content:space-between;padding:12px 0 0;font-weight:700;font-size:16px;}
  .toast{position:fixed;bottom:24px;right:24px;background:var(--stone);color:#fff;padding:13px 18px;border-radius:4px;font-size:13.5px;display:none;z-index:60;box-shadow:0 8px 24px rgba(0,0,0,.25);}
  .toast.show{display:block;animation:fade .2s;}
  .ai-note{background:#fbf3e8;border:1px solid #ecdcb8;border-radius:3px;padding:10px 13px;font-size:12.5px;color:#8a6d1c;margin-top:14px;}
  .conflict-note{background:#fbe9e0;border:1px solid #f0c4ac;border-radius:3px;padding:10px 13px;font-size:12.5px;color:var(--warn);margin-top:14px;}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login">
  <div class="mark">AADF × Pyramid of Tirana</div>
  <h1>Pyramid Backstage</h1>
  <p class="sub">One shared system for every request, space, asset, and task — replacing the emails, spreadsheets, and phone calls. Pick a role to preview.</p>
  <div class="role-grid">
    <button class="role-card" onclick="login('requester')">
      <span class="num">01 · External</span>
      <div class="name">Requester</div>
      <div class="desc">Submits an event request and tracks it through to confirmation.</div>
    </button>
    <button class="role-card" onclick="login('ops')">
      <span class="num">02 · Internal</span>
      <div class="name">Operations</div>
      <div class="desc">Matches spaces, manages inventory, runs setup &amp; teardown.</div>
    </button>
    <button class="role-card" onclick="login('manager')">
      <span class="num">03 · Internal</span>
      <div class="name">Manager</div>
      <div class="desc">Approves quotations, sets pricing, watches utilization.</div>
    </button>
    <button class="role-card" onclick="login('copilot')">
      <span class="num">04 · System</span>
      <div class="name">AI Copilot</div>
      <div class="desc">Matches requests to spaces and drafts quotes automatically.</div>
    </button>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="topbar">
    <div class="brand"><span class="tri"></span> Pyramid Backstage</div>
    <div class="row">
      <span class="who">Signed in as <b id="whoName"></b></span>
      <button class="logout" onclick="logout()">Switch role</button>
    </div>
  </div>
  <div class="tabs" id="tabs"></div>
  <main id="pages"></main>
</div>

<div class="modal-bg" id="modalBg" onclick="if(event.target===this)closeModal()">
  <div class="modal" style="position:relative" id="modalContent"></div>
</div>
<div class="toast" id="toast"></div>

<script>
/* ---------------- STATE ---------------- */
const SPACES = [
  {id:'blue', name:'Blue Hall', floor:'Floor 0', cap:220, color:'blue', rate:600},
  {id:'orange', name:'Orange Hall', floor:'Floor 0', cap:150, color:'orange', rate:450},
  {id:'green', name:'Green Hall', floor:'Floor -1', cap:180, color:'green', rate:500},
  {id:'yellow', name:'Yellow Hall', floor:'Floor -1', cap:90, color:'yellow', rate:300},
];

const INVENTORY = [
  {id:'chairs', name:'Chairs', total:500, unit:''},
  {id:'tables', name:'Tables', total:80, unit:''},
  {id:'mics', name:'Wireless mics', total:24, unit:''},
  {id:'screens', name:'LED screens', total:6, unit:''},
  {id:'speakers', name:'PA speakers', total:14, unit:''},
];

let requests = [
  {
    id:'REQ-104', org:'Tirana Startup Hub', contact:'Elona K.', email:'elona@startuphub.al',
    eventName:'Startup Demo Night', date:'2026-07-14', guests:180, type:'Conference',
    needs:'180 chairs, stage, 2 mics, 1 screen', status:'pending', space:null, quote:null,
    notes:[], assets:null, tasks:null
  },
  {
    id:'REQ-103', org:'Ministry of Culture', contact:'Dritan H.', email:'dritan@kultura.gov.al',
    eventName:'Heritage Photo Exhibition', date:'2026-07-02', guests:90, type:'Exhibition',
    needs:'Open floor, 4 screens, ambient sound', status:'review', space:'yellow', quote:1450,
    notes:['AI matched to Yellow Hall — fits capacity (90/90) and exhibition layout.'],
    assets:{chairs:0,tables:6,mics:1,screens:4,speakers:2}, tasks:null
  },
  {
    id:'REQ-102', org:'Sara & Endri', contact:'Sara M.', email:'sara.m@gmail.com',
    eventName:'Private Engagement Dinner', date:'2026-06-25', guests:60, type:'Private',
    needs:'60 chairs, 10 tables, soft lighting, speaker system', status:'approved', space:'orange', quote:980,
    notes:['Approved by Manager — deposit received.'],
    assets:{chairs:60,tables:10,mics:1,screens:0,speakers:2}, tasks:null
  },
  {
    id:'REQ-101', org:'Tirana Tech Week', contact:'Blendi G.', email:'blendi@ttw.al',
    eventName:'AI & Future of Work Summit', date:'2026-06-20', guests:200, type:'Conference',
    needs:'200 chairs, stage, 4 mics, 2 screens, full PA', status:'confirmed', space:'blue', quote:2150,
    notes:['Confirmed.','Setup crew assigned for June 19 evening.'],
    assets:{chairs:200,tables:8,mics:4,screens:2,speakers:6},
    tasks:[
      {t:'Confirm AV equipment pickup from storage', done:true},
      {t:'Set up stage + backdrop in Blue Hall', done:true},
      {t:'Arrange 200 chairs in theatre layout', done:false},
      {t:'Test mics & screens with AV team', done:false},
      {t:'Place signage at entrance & corridors', done:false},
      {t:'Post-event teardown & asset return', done:false},
    ]
  },
];

let currentRole = null;
let currentTab = null;

const ROLE_LABELS = {requester:'Tirana Startup Hub (Requester)', ops:'Arben — Operations', manager:'Ina — Manager', copilot:'AI Copilot (System)'};

const TABS = {
  requester: [['new','New Request'],['mine','My Requests']],
  ops: [['inbox','Request Inbox'],['calendar','Space Calendar'],['inventory','Inventory'],['tasks','Setup & Teardown']],
  manager: [['approvals','Approvals'],['analytics','Utilization'],['pricing','Pricing Rules']],
  copilot: [['matching','Matching Engine'],['log','Activity Log']],
};

/* ---------------- AUTH ---------------- */
function login(role){
  currentRole = role;
  document.getElementById('login').style.display='none';
  document.getElementById('app').style.display='block';
  document.getElementById('whoName').textContent = ROLE_LABELS[role];
  renderTabs();
  switchTab(TABS[role][0][0]);
}
function logout(){
  currentRole=null;
  document.getElementById('app').style.display='none';
  document.getElementById('login').style.display='flex';
}

/* ---------------- TABS / ROUTING ---------------- */
function renderTabs(){
  const tabsEl = document.getElementById('tabs');
  tabsEl.innerHTML = TABS[currentRole].map(([id,label])=>
    `<button class="tab" id="tab-${id}" onclick="switchTab('${id}')">${label}</button>`).join('');
}
function switchTab(id){
  currentTab=id;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('tab-'+id).classList.add('active');
  renderPage(id);
}
function renderPage(id){
  const pages = document.getElementById('pages');
  pages.innerHTML = PAGE_RENDER[id]();
}

/* ---------------- HELPERS ---------------- */
function spaceById(id){return SPACES.find(s=>s.id===id);}
function badge(status){
  const labels={pending:'Pending review',review:'AI matched',approved:'Approved',confirmed:'Confirmed'};
  return `<span class="badge ${status}">${labels[status]}</span>`;
}
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(window._toastTimer);
  window._toastTimer=setTimeout(()=>t.classList.remove('show'),2600);
}
function closeModal(){document.getElementById('modalBg').classList.remove('active');}
function openModal(html){
  document.getElementById('modalContent').innerHTML = `<button class="close-x" onclick="closeModal()">×</button>${html}`;
  document.getElementById('modalBg').classList.add('active');
}
function usedAssets(excludeId){
  const used={}; INVENTORY.forEach(i=>used[i.id]=0);
  requests.forEach(r=>{
    if(r.id===excludeId) return;
    if(r.assets && (r.status==='approved'||r.status==='confirmed'||r.status==='review')){
      Object.entries(r.assets).forEach(([k,v])=>used[k]=(used[k]||0)+v);
    }
  });
  return used;
}
function suggestSpace(guests){
  const fit = SPACES.filter(s=>s.cap>=guests).sort((a,b)=>a.cap-b.cap);
  return fit[0] || SPACES.reduce((a,b)=>a.cap>b.cap?a:b);
}
function estimateAssets(guests,type){
  return {
    chairs: Math.min(guests, 500),
    tables: type==='Private'? Math.ceil(guests/6) : Math.ceil(guests/30),
    mics: type==='Exhibition'?1: guests>150?4:2,
    screens: type==='Exhibition'?3: guests>150?2:1,
    speakers: guests>120?4:2,
  };
}

/* ---------------- REQUESTER PAGES ---------------- */
function pageNewRequest(){
  return `
  <h2 class="page-title">Submit an event request</h2>
  <p class="page-sub">Tell us what you're planning — the Copilot will match a space and draft a quote instantly.</p>
  <div class="grid2">
    <div class="card">
      <label>Event name</label><input id="f_name" placeholder="e.g. Startup Demo Night">
      <label>Event type</label>
      <select id="f_type"><option>Conference</option><option>Exhibition</option><option>Workshop</option><option>Performance</option><option>Private</option></select>
      <label>Date</label><input id="f_date" type="date" value="2026-08-01">
      <label>Expected guests</label><input id="f_guests" type="number" value="100" min="1">
      <label>Setup needs</label><textarea id="f_needs" placeholder="Chairs, stage, mics, screens, layout notes...">100 chairs, 1 screen, 2 mics</textarea>
      <div style="margin-top:18px"><button class="btn" onclick="submitRequest()">Submit request</button></div>
    </div>
    <div class="card">
      <h3 style="margin-top:0;font-size:15px">How matching works</h3>
      <p style="font-size:13px;color:#7a756a;line-height:1.6">Once submitted, the AI Copilot checks your guest count and event type against the four halls' capacity and layout fit, drafts a quote from current pricing rules, and flags it for Operations review. No back-and-forth needed to get a first answer.</p>
      <div class="ai-note">Average time from submission to first quote: <b>under 2 minutes</b>, instead of hours of email.</div>
    </div>
  </div>`;
}
function submitRequest(){
  const name=document.getElementById('f_name').value || 'Untitled Event';
  const type=document.getElementById('f_type').value;
  const date=document.getElementById('f_date').value;
  const guests=parseInt(document.getElementById('f_guests').value)||1;
  const needs=document.getElementById('f_needs').value;
  const space = suggestSpace(guests);
  const assets = estimateAssets(guests,type);
  const quote = Math.round(space.rate * 3 + guests*2.5);
  const id = 'REQ-'+(105+requests.filter(r=>r.id.startsWith('REQ-')).length);
  requests.unshift({
    id, org:'Tirana Startup Hub', contact:'You', email:'you@example.com',
    eventName:name, date, guests, type, needs, status:'review', space:space.id, quote,
    notes:[`AI matched to ${space.name} — fits capacity (${guests}/${space.cap}).`],
    assets, tasks:null
  });
  toast('Request submitted — Copilot matched a space and drafted a quote.');
  switchTab('mine');
}
function pageMyRequests(){
  const mine = requests.filter(r=>r.org==='Tirana Startup Hub');
  if(!mine.length) return `<h2 class="page-title">My requests</h2><div class="card empty">No requests yet.</div>`;
  return `
  <h2 class="page-title">My requests</h2>
  <p class="page-sub">Track each request from submission to confirmation.</p>
  <div class="card" style="padding:0">
    <table>
      <tr><th>Event</th><th>Date</th><th>Space</th><th>Quote</th><th>Status</th><th></th></tr>
      ${mine.map(r=>`
        <tr class="clickable" onclick="openRequesterDetail('${r.id}')">
          <td><b>${r.eventName}</b><br><span style="color:#9a948a;font-size:12px">${r.id}</span></td>
          <td>${r.date}</td>
          <td>${r.space?spacePill(r.space):'—'}</td>
          <td>${r.quote?'€'+r.quote:'pending'}</td>
          <td>${badge(r.status)}</td>
          <td><button class="btn small ghost">View</button></td>
        </tr>`).join('')}
    </table>
  </div>`;
}
function spacePill(id){
  const s=spaceById(id); return `<span class="space-pill"><span class="dot ${s.color}"></span>${s.name}</span>`;
}
function openRequesterDetail(id){
  const r=requests.find(x=>x.id===id);
  openModal(`
    <h3>${r.eventName}</h3>
    <p style="color:#7a756a;font-size:13px;margin-top:0">${r.id} · ${r.date} · ${r.guests} guests</p>
    ${badge(r.status)}
    ${r.space?`<div style="margin-top:14px">${spacePill(r.space)} <span style="color:#7a756a;font-size:13px">— ${r.needs}</span></div>`:''}
    ${r.quote?`
      <div class="card" style="margin-top:16px;background:var(--paper)">
        <div class="quote-line"><span>Space rental (3 sessions)</span><span>€${spaceById(r.space).rate*3}</span></div>
        <div class="quote-line"><span>Equipment &amp; setup</span><span>€${r.quote - spaceById(r.space).rate*3}</span></div>
        <div class="quote-total"><span>Total</span><span>€${r.quote}</span></div>
      </div>`:''}
    ${r.notes.length?`<div class="ai-note">${r.notes[r.notes.length-1]}</div>`:''}
    ${r.status==='review'?`<div style="margin-top:18px"><button class="btn" onclick="closeModal();toast('Approved — confirmation sent to Operations.')">Accept quote</button> <button class="btn ghost" onclick="closeModal()">Request changes</button></div>`:''}
  `);
}

/* ---------------- OPS PAGES ---------------- */
function pageInbox(){
  return `
  <h2 class="page-title">Request inbox</h2>
  <p class="page-sub">Every incoming request, AI-matched and ready for review — one queue instead of scattered inboxes.</p>
  <div class="card" style="padding:0">
    <table>
      <tr><th>Request</th><th>Date</th><th>Guests</th><th>Space</th><th>Quote</th><th>Status</th><th></th></tr>
      ${requests.map(r=>`
        <tr class="clickable" onclick="openOpsDetail('${r.id}')">
          <td><b>${r.eventName}</b><br><span style="color:#9a948a;font-size:12px">${r.org}</span></td>
          <td>${r.date}</td>
          <td>${r.guests}</td>
          <td>${r.space?spacePill(r.space):'<span style="color:#9a948a">unassigned</span>'}</td>
          <td>${r.quote?'€'+r.quote:'—'}</td>
          <td>${badge(r.status)}</td>
          <td><button class="btn small ghost">Open</button></td>
        </tr>`).join('')}
    </table>
  </div>`;
}
function openOpsDetail(id){
  const r=requests.find(x=>x.id===id);
  const conflict = checkConflict(r);
  openModal(`
    <h3>${r.eventName}</h3>
    <p style="color:#7a756a;font-size:13px;margin-top:0">${r.id} · ${r.org} · ${r.contact}</p>
    ${badge(r.status)}
    <label>Date</label><input value="${r.date}" disabled>
    <label>Assign space</label>
    <select id="ops_space">${SPACES.map(s=>`<option value="${s.id}" ${r.space===s.id?'selected':''}>${s.name} (cap ${s.cap})</option>`).join('')}</select>
    <label>Setup notes</label><textarea disabled>${r.needs}</textarea>
    ${conflict?`<div class="conflict-note">⚠ Conflict: ${conflict}</div>`:''}
    <div style="margin-top:18px" class="row">
      <button class="btn" onclick="opsAssign('${r.id}')">Confirm space &amp; reserve assets</button>
      <button class="btn ghost" onclick="closeModal()">Close</button>
    </div>
  `);
}
function checkConflict(r){
  const sameDay = requests.filter(x=>x.date===r.date && x.id!==r.id && (x.status==='approved'||x.status==='confirmed'));
  const sameSpace = sameDay.find(x=>x.space===r.space);
  if(sameSpace) return `${spaceById(r.space).name} already booked for "${sameSpace.eventName}" on ${r.date}.`;
  return null;
}
function opsAssign(id){
  const r=requests.find(x=>x.id===id);
  r.space = document.getElementById('ops_space').value;
  if(r.status==='pending') r.status='review';
  r.notes.push('Reviewed by Operations — space assignment confirmed.');
  closeModal();
  toast('Space assigned. Sent to Manager for approval.');
  renderPage(currentTab);
}
function pageCalendar(){
  const dates = [...new Set(requests.filter(r=>r.space).map(r=>r.date))].sort();
  return `
  <h2 class="page-title">Space calendar</h2>
  <p class="page-sub">Availability across all four halls at a glance.</p>
  <div class="card" style="padding:0">
    <table>
      <tr><th>Date</th>${SPACES.map(s=>`<th><span class="space-pill"><span class="dot ${s.color}"></span>${s.name}</span></th>`).join('')}</tr>
      ${dates.map(d=>`
        <tr>
          <td><b>${d}</b></td>
          ${SPACES.map(s=>{
            const booking = requests.find(r=>r.date===d && r.space===s.id);
            if(!booking) return `<td style="color:#9a948a">Open</td>`;
            return `<td>${booking.eventName}<br>${badge(booking.status)}</td>`;
          }).join('')}
        </tr>`).join('')}
    </table>
  </div>`;
}
function pageInventory(){
  const used = usedAssets(null);
  return `
  <h2 class="page-title">Inventory</h2>
  <p class="page-sub">Live view of every shared asset — what's reserved, what's free.</p>
  <div class="stat-row">
    ${INVENTORY.map(i=>{
      const u=used[i.id]||0; const pct=Math.round((u/i.total)*100);
      return `<div class="stat">
        <div class="n">${i.total-u}<span style="font-size:14px;color:#9a948a">/${i.total}</span></div>
        <div class="l">${i.name} available</div>
        <div class="inv-bar"><div style="width:${pct}%;background:${pct>80?'var(--warn)':'var(--green-space)'}"></div></div>
      </div>`;
    }).join('')}
  </div>
  <div class="card" style="padding:0">
    <table>
      <tr><th>Event</th><th>Date</th><th>Space</th><th>Chairs</th><th>Tables</th><th>Mics</th><th>Screens</th><th>Speakers</th></tr>
      ${requests.filter(r=>r.assets).map(r=>`
        <tr><td>${r.eventName}</td><td>${r.date}</td><td>${spacePill(r.space)}</td>
        <td>${r.assets.chairs}</td><td>${r.assets.tables}</td><td>${r.assets.mics}</td><td>${r.assets.screens}</td><td>${r.assets.speakers}</td></tr>
      `).join('')}
    </table>
  </div>`;
}
function pageTasks(){
  const withTasks = requests.filter(r=>r.tasks);
  const upcoming = requests.filter(r=>!r.tasks && (r.status==='approved'||r.status==='confirmed'));
  return `
  <h2 class="page-title">Setup &amp; teardown</h2>
  <p class="page-sub">Auto-generated checklists for confirmed events — no separate task list to maintain by hand.</p>
  ${withTasks.map(r=>{
    const doneCount = r.tasks.filter(t=>t.done).length;
    return `<div class="card">
      <div class="row" style="justify-content:space-between">
        <h3 style="margin:0;font-size:16px">${r.eventName} <span style="color:#9a948a;font-size:12.5px;font-weight:400">— ${r.date}, ${spaceById(r.space).name}</span></h3>
        <span style="font-size:12.5px;color:#7a756a">${doneCount}/${r.tasks.length} done</span>
      </div>
      <div class="checklist" style="margin-top:10px">
        ${r.tasks.map((t,i)=>`
          <label><input type="checkbox" ${t.done?'checked':''} onchange="toggleTask('${r.id}',${i})"><span class="${t.done?'done':''}">${t.t}</span></label>
        `).join('')}
      </div>
    </div>`;
  }).join('')}
  ${upcoming.length?`<div class="card"><p style="font-size:13px;color:#7a756a;margin:0">${upcoming.map(r=>r.eventName).join(', ')} ${upcoming.length>1?'are':'is'} approved but checklist generation hasn't run yet — generate from the request detail.</p></div>`:''}
  `;
}
function toggleTask(id,i){
  const r=requests.find(x=>x.id===id);
  r.tasks[i].done = !r.tasks[i].done;
  renderPage(currentTab);
}

/* ---------------- MANAGER PAGES ---------------- */
function pageApprovals(){
  const pending = requests.filter(r=>r.status==='review');
  return `
  <h2 class="page-title">Approvals</h2>
  <p class="page-sub">Quotations matched by the Copilot and reviewed by Operations, waiting on sign-off.</p>
  ${pending.length===0?`<div class="card empty">Nothing waiting on you right now.</div>`:''}
  ${pending.map(r=>`
    <div class="card">
      <div class="row" style="justify-content:space-between">
        <div>
          <h3 style="margin:0 0 4px;font-size:16px">${r.eventName}</h3>
          <span style="color:#7a756a;font-size:13px">${r.org} · ${r.date} · ${r.guests} guests · ${spacePill(r.space)}</span>
        </div>
        <div style="font-family:Georgia,serif;font-size:22px">€${r.quote}</div>
      </div>
      ${checkConflict(r)?`<div class="conflict-note">⚠ ${checkConflict(r)}</div>`:''}
      <div class="row" style="margin-top:14px">
        <button class="btn" onclick="approveRequest('${r.id}')">Approve</button>
        <button class="btn ghost" onclick="toast('Sent back to Operations with comments.')">Request changes</button>
      </div>
    </div>
  `).join('')}`;
}
function approveRequest(id){
  const r=requests.find(x=>x.id===id);
  r.status='approved';
  r.notes.push('Approved by Manager.');
  toast('Approved. Tasks &amp; asset reservation generated for Operations.');
  generateTasks(r);
  renderPage(currentTab);
}
function generateTasks(r){
  if(r.tasks) return;
  r.tasks=[
    {t:`Confirm AV equipment pickup for ${r.eventName}`, done:false},
    {t:`Set up ${spaceById(r.space).name} per layout brief`, done:false},
    {t:`Arrange ${r.assets.chairs} chairs / ${r.assets.tables} tables`, done:false},
    {t:'Test mics & screens with AV team', done:false},
    {t:'Place signage at entrance & corridors', done:false},
    {t:'Post-event teardown & asset return', done:false},
  ];
}
function pageAnalytics(){
  const counts={}; SPACES.forEach(s=>counts[s.id]=0);
  requests.forEach(r=>{if(r.space && r.status!=='pending') counts[r.space]++;});
  const max=Math.max(1,...Object.values(counts));
  return `
  <h2 class="page-title">Utilization</h2>
  <p class="page-sub">Which spaces carry the load — useful when programming starts to scale.</p>
  <div class="card">
    ${SPACES.map(s=>`
      <div style="margin-bottom:16px">
        <div class="row" style="justify-content:space-between;margin-bottom:6px">
          <span class="space-pill"><span class="dot ${s.color}"></span>${s.name}</span>
          <span style="font-size:12.5px;color:#7a756a">${counts[s.id]} booking${counts[s.id]!==1?'s':''}</span>
        </div>
        <div class="inv-bar" style="height:10px"><div style="width:${(counts[s.id]/max)*100}%;background:var(--${s.color}-space)"></div></div>
      </div>
    `).join('')}
  </div>
  <div class="stat-row" style="margin-top:20px">
    <div class="stat"><div class="n">${requests.length}</div><div class="l">Total requests</div></div>
    <div class="stat"><div class="n">${requests.filter(r=>r.status==='confirmed').length}</div><div class="l">Confirmed events</div></div>
    <div class="stat"><div class="n">€${requests.reduce((a,r)=>a+(r.quote||0),0)}</div><div class="l">Pipeline value</div></div>
    <div class="stat"><div class="n">${requests.filter(r=>checkConflict(r)).length}</div><div class="l">Active conflicts</div></div>
  </div>`;
}
function pagePricing(){
  return `
  <h2 class="page-title">Pricing rules</h2>
  <p class="page-sub">These rates feed the Copilot's automatic quotations.</p>
  <div class="card" style="padding:0">
    <table>
      <tr><th>Space</th><th>Capacity</th><th>Base rate / session</th></tr>
      ${SPACES.map(s=>`<tr><td>${spacePill(s.id)}</td><td>${s.cap} guests</td><td>€${s.rate}</td></tr>`).join('')}
    </table>
  </div>
  <div class="ai-note" style="margin-top:16px">Editing rates in a future version would instantly update every draft quote still in review — no resending proposals by hand.</div>`;
}

/* ---------------- COPILOT PAGES ---------------- */
function pageMatching(){
  const live = requests.filter(r=>r.status==='pending'||r.status==='review');
  return `
  <h2 class="page-title">Matching engine</h2>
  <p class="page-sub">How the Copilot turns a raw request into a matched space and draft quote.</p>
  ${live.map(r=>`
    <div class="card">
      <h3 style="margin:0 0 6px;font-size:15px">${r.eventName} <span style="color:#9a948a;font-weight:400;font-size:12.5px">${r.id}</span></h3>
      <p style="font-size:13px;color:#7a756a;margin:0 0 10px">${r.guests} guests · ${r.type} · ${r.date}</p>
      <div class="row" style="font-size:13px">
        <span>→ Capacity check across 4 halls</span>
      </div>
      <div class="row" style="font-size:13px;margin-top:4px">
        <span>→ Best fit: ${r.space?spacePill(r.space):'calculating...'}</span>
      </div>
      <div class="row" style="font-size:13px;margin-top:4px">
        <span>→ Draft quote: ${r.quote?'€'+r.quote:'—'}</span>
      </div>
      <div class="ai-note">${r.notes[0]||'Awaiting match.'}</div>
    </div>
  `).join('') || '<div class="card empty">No requests currently in the matching queue.</div>'}`;
}
function pageLog(){
  const all = requests.flatMap(r=>r.notes.map(n=>({id:r.id,name:r.eventName,n})));
  return `
  <h2 class="page-title">Activity log</h2>
  <p class="page-sub">A full, timestamped record of every automated and human decision — the single source of truth.</p>
  <div class="card" style="padding:0">
    <table>
      <tr><th>Request</th><th>Entry</th></tr>
      ${all.map(a=>`<tr><td><b>${a.id}</b><br><span style="color:#9a948a;font-size:12px">${a.name}</span></td><td>${a.n}</td></tr>`).join('')}
    </table>
  </div>`;
}

/* ---------------- PAGE MAP ---------------- */
const PAGE_RENDER = {
  new: pageNewRequest, mine: pageMyRequests,
  inbox: pageInbox, calendar: pageCalendar, inventory: pageInventory, tasks: pageTasks,
  approvals: pageApprovals, analytics: pageAnalytics, pricing: pagePricing,
  matching: pageMatching, log: pageLog,
};
</script>
</body>
</html>
