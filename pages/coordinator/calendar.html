<section class="space-y-8 fade-in">
  <div>
    <h2 class="text-3xl font-bold">Calendar View</h2>
    <p class="text-slate-400">Operational timeline for the active event.</p>
  </div>

  <div class="card">
    <h3 class="card-title">Operational Timeline</h3>
    <div id="lifecycle-steps" class="grid grid-cols-2 md:grid-cols-6 gap-3 text-center">
      <div class="timeline-step completed" data-idx="0">Request</div>
      <div class="timeline-step completed" data-idx="1">Approved</div>
      <div class="timeline-step active" data-idx="2">Setup</div>
      <div class="timeline-step" data-idx="3">Live Event</div>
      <div class="timeline-step" data-idx="4">Teardown</div>
      <div class="timeline-step" data-idx="5">Completed</div>
    </div>
  </div>
</section>
