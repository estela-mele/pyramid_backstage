<section class="space-y-6 fade-in">
  <div class="flex flex-col md:flex-row justify-between md:items-center gap-4">
    <div>
      <h2 class="text-3xl font-bold">Assets Registry</h2>
      <p class="text-slate-400">Full record of every tracked asset, location, and condition.</p>
    </div>
    <input id="asset-search" oninput="assetFilter(this.value)" class="input-field max-w-xs" placeholder="Search assets...">
  </div>

  <div class="card">
    <div class="table-wrapper">
      <table class="table">
        <thead>
          <tr><th>Asset</th><th>Location</th><th>Condition</th><th>Available</th><th>Status</th></tr>
        </thead>
        <tbody id="asset-rows"></tbody>
      </table>
    </div>
  </div>
</section>
