<section class="space-y-8 fade-in">
  <div class="flex items-center justify-between">
    <div>
      <h2 class="text-3xl font-bold">Events Archive</h2>
      <p class="text-slate-400 text-sm">Full history of your submitted and completed events.</p>
    </div>
    <button class="btn-secondary" onclick="navigateTo('organizer')">Back to Dashboard</button>
  </div>

  <div class="card">
    <div id="archive-list" class="space-y-3">
      <p class="text-slate-500 text-sm" id="archive-empty">No events submitted yet.</p>
    </div>
  </div>

  <div id="bill-modal" class="hidden fixed inset-0 bg-black/80 z-[100] flex items-center justify-center p-4" onclick="closeBill(event)">
    <div class="card max-w-md w-full space-y-5 relative" onclick="event.stopPropagation()">
      <button onclick="document.getElementById('bill-modal').classList.add('hidden')" class="absolute top-4 right-4 text-slate-400 hover:text-white"><i data-lucide="x" class="w-4 h-4"></i></button>
      <div class="flex items-center gap-3 border-b border-slate-800 pb-4">
        <div class="p-2 rounded-lg bg-cyan-500/10 text-cyan-400"><i data-lucide="receipt" class="w-5 h-5"></i></div>
        <div><div class="font-bold text-lg" id="bill-title"></div><div class="text-slate-400 text-xs" id="bill-date"></div></div>
      </div>
      <div class="space-y-2 text-sm" id="bill-lines"></div>
      <div class="border-t border-slate-800 pt-4 flex justify-between items-center">
        <span class="text-slate-400 text-sm">Total Estimate</span>
        <span class="text-2xl font-black text-cyan-400" id="bill-total"></span>
      </div>
      <p class="text-xs text-slate-500">* Final invoice may vary based on confirmed services.</p>
    </div>
  </div>
</section>
